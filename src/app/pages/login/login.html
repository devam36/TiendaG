<main class="login-main">
  <section class="login-card">
    <h1>Bienvenidos a la Tienda Genérica</h1>

    <form class="login-form">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input id="usuario" type="text" placeholder="Ingresa tu usuario" [(ngModel)]="usuario" name="usuario" />
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input id="contrasena" type="password" placeholder="Ingresa tu contraseña" [(ngModel)]="contrasena" name="contrasena" />
      </div>

      <div class="button-group">
        <button type="button" class="btn-aceptar" (click)="aceptar()">Aceptar</button>
        <button type="button" class="btn-cancelar" (click)="cancelar()">Cancelar</button>
      </div>
    </form>
  </section>
</main>
