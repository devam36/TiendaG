<div class="layout-container">
  <!-- Sidebar -->
  <app-sidebar [isOpen]="isSidebarOpen()"></app-sidebar>

  <!-- Header con botón toggle -->
  <header class="main-header">
    <button class="toggle-btn" (click)="toggleSidebar()" [attr.aria-label]="isSidebarOpen() ? 'Cerrar menú' : 'Abrir menú'">
      <span class="hamburger" [class.open]="isSidebarOpen()">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
    <div class="header-title">Tienda Genérica</div>
  </header>

  <!-- Contenido principal -->
  <main class="main-content" [class.sidebar-open]="isSidebarOpen()">
    <router-outlet></router-outlet>
  </main>
</div>
